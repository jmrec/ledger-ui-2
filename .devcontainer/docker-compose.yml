services:
  ledger-ui-2:
    container_name: ledger-ui
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspace:cached
    command: sleep infinity
    networks:
      - ledger-net

networks:
  ledger-net:
    external: true

volumes:
  vscode_extensions:
    external: true
  vscode_data:
    external: true